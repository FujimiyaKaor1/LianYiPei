{% extends "layout/base.html" %}

{% block title %}企业审核管理 - 链易配{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-shield-check"></i> 企业注册审核</h4>
        <div class="d-flex gap-2">
            <span class="badge bg-warning fs-6">待审核: <span id="pendingCount">0</span></span>
            <span class="badge bg-success fs-6">已通过: <span id="approvedCount">0</span></span>
            <span class="badge bg-danger fs-6">已驳回: <span id="rejectedCount">0</span></span>
        </div>
    </div>

    <!-- 筛选和搜索 -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-center">
                <div class="col-md-3">
                    <select class="form-select" id="statusFilter" onchange="loadVerifications()">
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已驳回</option>
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchKeyword" 
                           placeholder="搜索企业名称..." onkeyup="handleSearch(event)">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="loadVerifications()">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </div>
                <div class="col-md-3">
                    <div class="d-flex gap-2 justify-content-end">
                        <button class="btn btn-outline-primary btn-sm" onclick="refreshList()">
                            <i class="bi bi-arrow-repeat"></i> 刷新
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="messageBox"></div>

    <!-- 企业列表 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-ul"></i> 企业列表</span>
            <span class="badge bg-secondary" id="totalCount">共 0 条</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 40px;">#</th>
                            <th>企业名称</th>
                            <th>联系人</th>
                            <th>联系电话</th>
                            <th>注册时间</th>
                            <th>审核状态</th>
                            <th style="width: 200px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="verificationTable">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-hourglass-split"></i> 加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- 分页 -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <div id="paginationInfo" class="text-muted">显示 0-0 条，共 0 条</div>
            <nav>
                <ul class="pagination pagination-sm mb-0" id="pagination">
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 审核详情模态框 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-building"></i> 企业详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailContent">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
            <div class="modal-footer" id="detailActions">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
</div>

<!-- 驳回原因模态框 -->
<div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-x-circle"></i> 驳回原因</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="rejectEnterpriseId">
                <div class="mb-3">
                    <label class="form-label">请填写驳回原因 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="rejectReason" rows="4" 
                              placeholder="请说明驳回的具体原因，以便企业了解如何改进..."></textarea>
                </div>
                <div class="alert alert-info mb-0">
                    <small><i class="bi bi-info-circle"></i> 驳回后，企业将收到通知，并可重新提交注册申请。</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmReject()">
                    <i class="bi bi-x-circle"></i> 确认驳回
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
{{ super() }}
<script>
let currentPage = 1;
let currentStatus = 'pending';
let detailModal, rejectModal;

document.addEventListener('DOMContentLoaded', function() {
    detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
    rejectModal = new bootstrap.Modal(document.getElementById('rejectModal'));
    
    loadVerifications();
    loadStats();
});

function loadStats() {
    fetch('/admin/api/verifications/stats')
        .then(r => r.json())
        .then(data => {
            document.getElementById('pendingCount').textContent = data.pending;
            document.getElementById('approvedCount').textContent = data.approved;
            document.getElementById('rejectedCount').textContent = data.rejected;
        })
        .catch(err => console.error('加载统计失败:', err));
}

function loadVerifications(page = 1) {
    currentPage = page;
    currentStatus = document.getElementById('statusFilter').value;
    const keyword = document.getElementById('searchKeyword').value.trim();
    
    let url = `/admin/api/verifications?status=${currentStatus}&page=${page}&per_page=10`;
    if (keyword) {
        url += `&keyword=${encodeURIComponent(keyword)}`;
    }
    
    fetch(url)
        .then(r => r.json())
        .then(data => {
            renderTable(data);
        })
        .catch(err => {
            console.error('加载失败:', err);
            showMessage('danger', '加载失败，请重试');
        });
}

function renderTable(data) {
    const tbody = document.getElementById('verificationTable');
    const items = data.items || [];
    
    if (items.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="7" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                    暂无数据
                </td>
            </tr>
        `;
    } else {
        tbody.innerHTML = items.map((item, index) => `
            <tr>
                <td>${(currentPage - 1) * 10 + index + 1}</td>
                <td>
                    <a href="javascript:void(0)" onclick="showDetail(${item.id})" class="text-decoration-none fw-bold">
                        ${escapeHtml(item.name)}
                    </a>
                </td>
                <td>${escapeHtml(item.contact) || '-'}</td>
                <td>${escapeHtml(item.phone) || '-'}</td>
                <td>${item.registered_at || '-'}</td>
                <td>${getStatusBadge(item.verification_status)}</td>
                <td>
                    ${getActionButtons(item)}
                </td>
            </tr>
        `).join('');
    }
    
    // 更新分页信息
    document.getElementById('totalCount').textContent = `共 ${data.total} 条`;
    renderPagination(data);
}

function getStatusBadge(status) {
    const badges = {
        'pending': '<span class="badge bg-warning">待审核</span>',
        'approved': '<span class="badge bg-success">已通过</span>',
        'rejected': '<span class="badge bg-danger">已驳回</span>'
    };
    return badges[status] || `<span class="badge bg-secondary">${status}</span>`;
}

function getActionButtons(item) {
    if (item.verification_status === 'pending') {
        return `
            <button class="btn btn-primary btn-sm" onclick="showDetail(${item.id})">
                <i class="bi bi-eye"></i> 审核
            </button>
        `;
    } else if (item.verification_status === 'rejected') {
        return `
            <button class="btn btn-outline-secondary btn-sm" onclick="showDetail(${item.id})">
                <i class="bi bi-eye"></i> 查看
            </button>
            <button class="btn btn-outline-primary btn-sm" onclick="resetVerification(${item.id})">
                <i class="bi bi-arrow-counterclockwise"></i> 重置
            </button>
        `;
    } else {
        return `
            <button class="btn btn-outline-secondary btn-sm" onclick="showDetail(${item.id})">
                <i class="bi bi-eye"></i> 查看
            </button>
        `;
    }
}

function renderPagination(data) {
    const pagination = document.getElementById('pagination');
    const info = document.getElementById('paginationInfo');
    
    const start = (data.page - 1) * data.per_page + 1;
    const end = Math.min(data.page * data.per_page, data.total);
    info.textContent = `显示 ${start}-${end} 条，共 ${data.total} 条`;
    
    if (data.pages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    
    // 上一页
    html += `<li class="page-item ${data.page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="loadVerifications(${data.page - 1})">‹</a>
    </li>`;
    
    // 页码
    for (let i = 1; i <= data.pages; i++) {
        if (i === 1 || i === data.pages || (i >= data.page - 2 && i <= data.page + 2)) {
            html += `<li class="page-item ${i === data.page ? 'active' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="loadVerifications(${i})">${i}</a>
            </li>`;
        } else if (i === data.page - 3 || i === data.page + 3) {
            html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        }
    }
    
    // 下一页
    html += `<li class="page-item ${data.page >= data.pages ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="loadVerifications(${data.page + 1})">›</a>
    </li>`;
    
    pagination.innerHTML = html;
}

function showDetail(id) {
    fetch(`/admin/api/verifications/${id}`)
        .then(r => r.json())
        .then(data => {
            renderDetailModal(data);
            detailModal.show();
        })
        .catch(err => {
            console.error('加载详情失败:', err);
            showMessage('danger', '加载详情失败');
        });
}

function renderDetailModal(data) {
    const content = document.getElementById('detailContent');
    const actions = document.getElementById('detailActions');
    
    const statusMap = {
        'pending': '<span class="badge bg-warning">待审核</span>',
        'approved': '<span class="badge bg-success">已通过</span>',
        'rejected': '<span class="badge bg-danger">已驳回</span>'
    };
    
    content.innerHTML = `
        <div class="row">
            <div class="col-md-8">
                <table class="table table-borderless">
                    <tr>
                        <th style="width: 120px;">企业名称</th>
                        <td class="fw-bold">${escapeHtml(data.name)}</td>
                    </tr>
                    <tr>
                        <th>联系人</th>
                        <td>${escapeHtml(data.contact) || '-'}</td>
                    </tr>
                    <tr>
                        <th>联系电话</th>
                        <td>${escapeHtml(data.phone) || '-'}</td>
                    </tr>
                    <tr>
                        <th>企业地址</th>
                        <td>${escapeHtml(data.address) || '-'}</td>
                    </tr>
                    <tr>
                        <th>所在地区</th>
                        <td>${escapeHtml(data.province || '')} ${escapeHtml(data.city || '')}</td>
                    </tr>
                    <tr>
                        <th>行业代码</th>
                        <td>${escapeHtml(data.industry_code) || '-'}</td>
                    </tr>
                    <tr>
                        <th>注册资本</th>
                        <td>${data.registered_capital ? data.registered_capital + '万元' : '-'}</td>
                    </tr>
                    <tr>
                        <th>经营范围</th>
                        <td>${escapeHtml(data.business_scope) || '-'}</td>
                    </tr>
                </table>
            </div>
            <div class="col-md-4">
                <div class="card bg-light">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <i class="bi bi-building fs-1 text-primary"></i>
                        </div>
                        <h5 class="mb-3">${escapeHtml(data.name)}</h5>
                        <div class="mb-2">审核状态</div>
                        <div class="mb-3">${statusMap[data.verification_status]}</div>
                        <div class="mb-2"><small class="text-muted">注册时间</small></div>
                        <div>${data.registered_at || '-'}</div>
                        ${data.verified_at ? `
                            <hr>
                            <div class="mb-2"><small class="text-muted">审核时间</small></div>
                            <div>${data.verified_at}</div>
                        ` : ''}
                        ${data.rejection_reason ? `
                            <hr>
                            <div class="mb-2"><small class="text-muted">驳回原因</small></div>
                            <div class="text-danger">${escapeHtml(data.rejection_reason)}</div>
                        ` : ''}
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body text-center">
                        <div class="fs-4 fw-bold">${data.product_count || 0}</div>
                        <small>已发布产品</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white">
                    <div class="card-body text-center">
                        <div class="fs-4 fw-bold">${data.inquiry_count || 0}</div>
                        <small>发起询价</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-secondary text-white">
                    <div class="card-body text-center">
                        <div class="fs-4 fw-bold">${data.registered_capital ? data.registered_capital + '万' : '-'}</div>
                        <small>注册资本</small>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    // 操作按钮
    if (data.verification_status === 'pending') {
        actions.innerHTML = `
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-danger" onclick="showRejectModal(${data.id})">
                <i class="bi bi-x-circle"></i> 驳回
            </button>
            <button type="button" class="btn btn-success" onclick="approveEnterprise(${data.id})">
                <i class="bi bi-check-circle"></i> 通过审核
            </button>
        `;
    } else if (data.verification_status === 'rejected') {
        actions.innerHTML = `
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
            <button type="button" class="btn btn-primary" onclick="resetVerification(${data.id})">
                <i class="bi bi-arrow-counterclockwise"></i> 重置为待审核
            </button>
        `;
    } else {
        actions.innerHTML = `
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        `;
    }
}

function showRejectModal(id) {
    document.getElementById('rejectEnterpriseId').value = id;
    document.getElementById('rejectReason').value = '';
    detailModal.hide();
    rejectModal.show();
}

function confirmReject() {
    const id = document.getElementById('rejectEnterpriseId').value;
    const reason = document.getElementById('rejectReason').value.trim();
    
    if (!reason) {
        alert('请填写驳回原因');
        return;
    }
    
    fetch(`/admin/api/verifications/${id}/reject`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({reason: reason})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showMessage('success', '已驳回该企业注册申请');
            rejectModal.hide();
            loadVerifications(currentPage);
            loadStats();
        } else {
            showMessage('danger', data.error || '操作失败');
        }
    })
    .catch(err => {
        console.error('驳回失败:', err);
        showMessage('danger', '操作失败，请重试');
    });
}

function approveEnterprise(id) {
    if (!confirm('确定要通过该企业的注册申请吗？')) return;
    
    fetch(`/admin/api/verifications/${id}/approve`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'}
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showMessage('success', '已通过审核');
            detailModal.hide();
            loadVerifications(currentPage);
            loadStats();
        } else {
            showMessage('danger', data.error || '操作失败');
        }
    })
    .catch(err => {
        console.error('审核失败:', err);
        showMessage('danger', '操作失败，请重试');
    });
}

function resetVerification(id) {
    if (!confirm('确定要重置该企业的审核状态吗？')) return;
    
    fetch(`/admin/api/verifications/${id}/reset`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'}
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showMessage('success', '已重置为待审核');
            detailModal.hide();
            loadVerifications(currentPage);
            loadStats();
        } else {
            showMessage('danger', data.error || '操作失败');
        }
    })
    .catch(err => {
        console.error('重置失败:', err);
        showMessage('danger', '操作失败，请重试');
    });
}

function refreshList() {
    loadVerifications(currentPage);
    loadStats();
}

function handleSearch(event) {
    if (event.key === 'Enter') {
        loadVerifications(1);
    }
}

function showMessage(type, text) {
    const box = document.getElementById('messageBox');
    box.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${text}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
    setTimeout(() => {
        const alert = box.querySelector('.alert');
        if (alert) alert.remove();
    }, 5000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
