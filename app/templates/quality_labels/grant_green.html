{% extends "layout/base.html" %}

{% block title %}颁发政府绿标 - 链易配{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:640px;">
  <div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('quality_labels.manage') }}" class="btn btn-outline-secondary btn-sm me-3">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0"><i class="bi bi-award me-2 text-success"></i>颁发政府绿标</h4>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-semibold">选择企业 <span class="text-danger">*</span></label>
        <select class="form-select" id="enterpriseId">
          <option value="">请选择企业</option>
          {% for ent in enterprises %}
          <option value="{{ ent.id }}">{{ ent.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">标签名称</label>
        <input type="text" class="form-control" id="labelName" value="政府绿色认证" placeholder="如：政府绿色认证">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">证书编号</label>
        <input type="text" class="form-control" id="certificateNo" placeholder="可选">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">有效期（天）</label>
        <input type="number" class="form-control" id="validDays" value="365" min="1" max="3650">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-success" onclick="grantGreenLabel()">
          <i class="bi bi-award me-1"></i>颁发绿标
        </button>
        <a href="{{ url_for('quality_labels.manage') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </div>
  </div>

  <div id="resultMsg" class="mt-3"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function grantGreenLabel() {
  const enterpriseId = document.getElementById('enterpriseId').value;
  if (!enterpriseId) { alert('请选择企业'); return; }
  const payload = {
    enterprise_id: parseInt(enterpriseId),
    label_name: document.getElementById('labelName').value || '政府绿色认证',
    certificate_no: document.getElementById('certificateNo').value,
    valid_days: parseInt(document.getElementById('validDays').value) || 365,
  };
  const res = await fetch('/quality-labels/api/grant-green', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  const el = document.getElementById('resultMsg');
  if (data.success) {
    el.innerHTML = '<div class="alert alert-success">绿标颁发成功！</div>';
  } else {
    el.innerHTML = `<div class="alert alert-danger">${data.message || '颁发失败'}</div>`;
  }
}
</script>
{% endblock %}
