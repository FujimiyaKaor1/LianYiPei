{% extends "layout/base.html" %}

{% block title %}编辑企业信息 - 链易配{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> 编辑企业信息</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="address" class="form-label">企业地址</label>
                        <input type="text" class="form-control" id="address" name="address" value="{{ current_user.address }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="longitude" class="form-label">经度</label>
                                <input type="number" step="0.0001" class="form-control" id="longitude" name="longitude" value="{{ current_user.longitude }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="latitude" class="form-label">纬度</label>
                                <input type="number" step="0.0001" class="form-control" id="latitude" name="latitude" value="{{ current_user.latitude }}">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="contact" class="form-label">联系人</label>
                                <input type="text" class="form-control" id="contact" name="contact" value="{{ current_user.contact }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="phone" class="form-label">联系电话</label>
                                <input type="text" class="form-control" id="phone" name="phone" value="{{ current_user.phone }}">
                            </div>
                        </div>
                    </div>
                    <hr>
                    <h6 class="text-muted">技术能力画像</h6>
                    <div class="mb-3">
                        <label for="patent_category" class="form-label">专利类别</label>
                        <select class="form-select" id="patent_category" name="patent_category">
                            <option value="">请选择</option>
                            <option value="发明专利" {% if current_user.patent_category=='发明专利' %}selected{% endif %}>发明专利</option>
                            <option value="实用新型" {% if current_user.patent_category=='实用新型' %}selected{% endif %}>实用新型</option>
                            <option value="外观设计" {% if current_user.patent_category=='外观设计' %}selected{% endif %}>外观设计</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="tech_keywords" class="form-label">技术关键词</label>
                        <input type="text" class="form-control" id="tech_keywords" name="tech_keywords" 
                               value="{{ current_user.tech_keywords or '' }}" placeholder="逗号分隔，如：智能制造,精密加工,传感器">
                    </div>
                    <div class="mb-3">
                        <label for="rd_investment" class="form-label">研发投入(万元)</label>
                        <input type="number" step="0.1" class="form-control" id="rd_investment" name="rd_investment" 
                               value="{{ current_user.rd_investment or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="industry_code" class="form-label">行业标准编码</label>
                        <select class="form-select" id="industry_code" name="industry_code">
                            <option value="">请选择</option>
                            {% for code, name in industry_codes %}
                            <option value="{{ code }}" {% if current_user.industry_code==code %}selected{% endif %}>{{ code }} {{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                    <a href="{{ url_for('enterprise.profile') }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
